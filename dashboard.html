<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="./tailwindConnect.css">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- font  -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind + daisy ui  -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome  -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="bg-[#F8FAFC] min-h-screen">

    <!-- header  -->

    <header class="bg-white shadow-sm">
        <div class="w-[90%] mx-auto flex justify-between py-4">

            <!-- left side  -->

            <div class="flex items-center gap-1">
                <img src="./assets/github-logo.png" alt="" class="w-9 h-[37px]">
                <h2 class="text-2xl font-semibold text-[#1F2937]">
                    GitHub Issues Tracker
                </h2>
            </div>



            <!-- right side  -->

            <div class="flex gap-4">
                <input id="search-input" type="search" placeholder="Search issues..."
                    class="outline-none bg-transparent px-2 py-2 text-sm w-48">
                <button class="btn btn-primary" id="srch-btn">
                    Search
                </button>
            </div>
        </div>
    </header>



    <!-- all btn  -->

    <section>

        <div class="bg-white w-[80%] mx-auto mt-[60px] p-5 shadow-sm rounded-lg">
            <div class="flex gap-1 mb-4">
                <button id="all-btn" class="tab-btn btn btn-primary px-5 py-2">
                    All
                </button>

                <button id="open-btn" class="tab-btn btn btn-outline px-5 py-2">
                    Open
                </button>
                <button id="closed-btn" class="tab-btn btn btn-outline px-5 py-2">
                    Closed
                </button>
            </div>
        </div>
    </section>



    <!-- Issue  -->

    <section>
        <div class="bg-white w-[80%] mx-auto mt-[60px] p-5 shadow-sm rounded-lg">
            <div class="flex justify-between">

                <!-- left side  -->

                <div class="flex items-center gap-2">
                    <div class="max-w-[50px] max-h-[50px]">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h4 class="text-[20px] font-semibold text-[#1F2937]" id="issue-count">
                            50 Issues
                        </h4>
                        <p class="text-[16px] text-[#64748B]">
                            Track and manage your project issues
                        </p>
                    </div>
                </div>



                <!-- right side  -->
                <!-- Open  -->

                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-1">
                        <div class=" bg-[#00A96E] w-3 h-3 rounded-full">
                        </div>
                        <p>
                            Open
                        </p>
                    </div>

                    <!-- Close  -->

                    <div class="flex items-center gap-1">
                        <div class=" bg-[#A855F7] w-3 h-3 rounded-full">
                        </div>
                        <p>
                            Closed
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>



    <!-- Issue card  -->

    <section>
        <div class="bg-[#FBFBFB] w-[80%] mx-auto shadow-sm rounded-lg p-6">
            <div id="issue-container" class="grid grid-cols-1 md:grid-cols-4 gap-6">
            </div>
        </div>
    </section>


    <!-- modal  -->
    <dialog id="issue_modal" class="modal">
        <div class="modal-box max-w-2xl">
            <div id="modal-content">

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary bg-[#6419E6] border-none px-8">Close</button>
                </form>
            </div>
        </div>
    </dialog>



    <script src="./Scripts/dashboard.js"></script>

</body>

</html>
